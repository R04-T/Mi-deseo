<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Meta - Medellín</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        #deseo { 
            font-size: 2.5rem; 
            margin: 20px; 
            font-weight: bold;
            background: linear-gradient(to right, #fff, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #mariangel {
            font-style: italic;
            color: #ff4d6d;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        #timer { 
            font-size: 5rem; 
            font-weight: 800; 
            color: #4CAF50;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        .container { border: 1px solid #333; padding: 40px; border-radius: 20px; background: #1a1a1a; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi deseo y mi fe</h1>
        <div id="deseo">Que mis papás consigan empleo en Medellín</div>
        
        <div id="mariangel">❤️ Por nosotros y por quedarme con Mariángel</div>
        
        <div id="timer">Calculando tiempo...</div>
    </div>

    <script>
        // Cambia esta fecha a la fecha límite que te dieron tus papás
        const fechaMeta = new Date("April 20, 2026 23:59:59").getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaMeta - ahora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            if (distancia < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "FE Y ESPERANZA";
            } else {
                document.getElementById("timer").innerHTML = dias + "d " + horas + "h " + minutos + "m " + segundos + "s ";
            }
        }, 1000);
    </script>
</body>
</html>
